services:
  weave-server:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "4111:4111"
      - "4112:4112"
    volumes:
      - weave-data:/app/.data
    environment:
      NODE_ENV: production
      PORT: 4111
      MASTRA_HOST: 0.0.0.0
      WEAVE_PORTAL_WS_PORT: 4112
      # Required auth. Prefer Dokploy environment variables/secrets over committing values.
      # WEAVE_AUTH_TOKEN: change-me
      # or:
      # WEAVE_AUTH_TOKENS: '{"wv_xxx":{"id":"user-1","name":"Jaco"}}'
      # Model config lives on server only.
      # WEAVE_DEFAULT_MODEL: openai/gpt-5.5
      # WEAVE_MODEL_OPTIONS: '[{"id":"openai/gpt-5.5","label":"GPT 5.5"}]'
      # Provider keys, if used by configured models/tools.
      # OPENAI_API_KEY: ...
      # ANTHROPIC_API_KEY: ...
      # EXA_API_KEY: ...
      # Optional remote storage instead of local /app/.data/mastra.db.
      # TURSO_DATABASE_URL: ...
      # TURSO_AUTH_TOKEN: ...

volumes:
  weave-data:
